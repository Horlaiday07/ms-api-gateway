spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback
          metadata:
            timeout: 5000

        - id: admin-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/admin/**
          filters:
            - name: CircuitBreaker
              args:
                name: adminCircuitBreaker
                fallbackUri: forward:/fallback
          metadata:
            timeout: 5000

        - id: payout-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/payout/**
          filters:
            - name: CircuitBreaker
              args:
                name: payoutCircuitBreaker
                fallbackUri: forward:/fallback
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                methods: GET,POST
                backoff:
                  firstBackoff: 500ms
                  maxBackoff: 2s
                  factor: 2
          metadata:
            timeout: 10000

        - id: ipn-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/ipn/**
          filters:
            - name: CircuitBreaker
              args:
                name: ipnCircuitBreaker
                fallbackUri: forward:/fallback
          metadata:
            timeout: 5000

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-long-enough}

ip:
  whitelist:
    - 127.0.0.1
    - 196.0.0.1

resilience4j:
  circuitbreaker:
    instances:
      authCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      payoutCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      adminCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
      ipnCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  retry:
    instances:
      payoutCircuitBreaker:
        maxAttempts: 3
        waitDuration: 500ms
        exponentialBackoffMultiplier: 2

logging:
  level:
    com.remit.mellonsecure.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
